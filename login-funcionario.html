<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Funcionário - Academia Pelé</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/app.js" defer></script>
</head>
<body>

<h1>Acesso Funcionário</h1>

<section class="box">

  <form id="form-login-funcionario">

    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" placeholder="funcionario@peleacademia.com">

    <label for="senha">Senha</label>
    <input type="password" id="senha" name="senha" placeholder="Sua senha">

    <a href="#">Esqueci minha senha</a>

    <button type="submit">Entrar</button>
  </form>
</section>

<a href="login.html" class="btn-secundario">← Voltar</a>

</body>
</html>
